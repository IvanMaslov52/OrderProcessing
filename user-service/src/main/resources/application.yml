server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/orders_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # TODO: заменить на validate + Flyway
    show-sql: true
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false       # TODO: включить и добавить миграции в db/migration/

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
